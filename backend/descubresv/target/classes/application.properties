spring.application.name=descubresv
server.port=8080

// conexion postgresql via docker
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/descubresv_db}
spring.datasource.username=${DB_USERNAME:descubresv_user}
spring.datasource.password=${DB_PASSWORD:descubresv_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

// inicializacion de base de datos
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.separator=;;
// evitar conflictos entre hibernate y script manual
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

// seguridad jwt
jwt.secret=${JWT_SECRET:ZGVzY3VicmVzdl9zZWNyZXRfa2V5X3N1cGVyX3NlZ3VyYV8yMDI2X3Byb3llY3Rv}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.cookie-name=jwt_token

// documentacion swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

// origenes permitidos cors
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
